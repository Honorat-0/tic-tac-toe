<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic tac toe</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <div class="score">
        <p>SCORE</p>
        <div>
            <div class="x">x<span class="player1">0</span></div>
            <div class="o">o<span class="player2">0</span></div>
        </div>
        
    </div>
    
    <div>
        <dialog>
            <div>
                <p class="decision"></p>
                <p class="player"></p>
                <button>Play again</button>
            </div> 
        </dialog>
    </div>
    <div class="container">
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
    </div>
</body>
</html>
